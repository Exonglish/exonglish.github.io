---
layout: default
title: Search
---

<div class="search-page">
  <div class="search-header">
    <h1 class="lvl0" id="search">Search</h1>
    <p>Find what you're looking for across all my content</p>
  </div>

  <div class="search-container">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-trigger" placeholder="Search posts, topics, tags..." autofocus autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="Clear search">&#x2715;</button>
    </div>

    <div id="search-status"></div>
    <div id="search-results"></div>
  </div>
</div>

<script>
(function () {
  const input   = document.getElementById('search-trigger');
  const clear   = document.getElementById('search-clear');
  const status  = document.getElementById('search-status');
  const results = document.getElementById('search-results');

  let allPosts = [];
  let debounceTimer;

  // ── helpers ──────────────────────────────────────────────────────────────

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function highlight(text, terms) {
    let out = escHtml(text);
    terms.forEach(function(term) {
      const re = new RegExp('(' + escRegex(escHtml(term)) + ')', 'gi');
      out = out.replace(re, '<mark>$1</mark>');
    });
    return out;
  }

  // Pull a ~200-char snippet from content centered around the first term hit
  function snippet(content, terms) {
    const lower = content.toLowerCase();
    let best = -1;
    terms.forEach(function(term) {
      const idx = lower.indexOf(term);
      if (idx !== -1 && (best === -1 || idx < best)) best = idx;
    });
    const start = best === -1 ? 0 : Math.max(0, best - 80);
    const end   = Math.min(content.length, start + 220);
    const chunk = (start > 0 ? '…' : '') + content.slice(start, end).trim() + (end < content.length ? '…' : '');
    return chunk;
  }

  // Relevance score: title hit = 10 pts, tag = 5 pts, category = 3 pts, content = 1 pt/occurrence
  function scoreItem(item, terms) {
    let s = 0;
    const title    = item.title.toLowerCase();
    const content  = item.content.toLowerCase();
    const tags     = (item.tags || []).map(function(t){ return t.toLowerCase(); });
    const category = (item.category || '').toLowerCase();

    terms.forEach(function(term) {
      if (title.indexOf(term) !== -1)            s += 10;
      if (tags.some(function(t){ return t.indexOf(term) !== -1; })) s += 5;
      if (category.indexOf(term) !== -1)         s += 3;

      // count body occurrences (capped at 20 to avoid huge docs dominating)
      let idx = 0, count = 0;
      while ((idx = content.indexOf(term, idx)) !== -1 && count < 20) { s++; count++; idx++; }
    });
    return s;
  }

  // ── search ───────────────────────────────────────────────────────────────

  function doSearch(query) {
    query = query.trim();
    clear.style.display = query ? 'flex' : 'none';

    if (!query) {
      status.innerHTML  = '';
      results.innerHTML = '';
      return;
    }

    if (allPosts.length === 0) {
      status.innerHTML = '<p class="search-loading">Loading index…</p>';
      return;
    }

    const terms = query.toLowerCase().split(/\s+/).filter(Boolean);

    const scored = allPosts
      .map(function(item) { return { item: item, score: scoreItem(item, terms) }; })
      .filter(function(r) { return r.score > 0; })
      .sort(function(a, b) { return b.score - a.score; });

    if (scored.length === 0) {
      status.innerHTML  = '';
      results.innerHTML = '<div class="no-results">No results for <strong>' + escHtml(query) + '</strong>. Try different keywords.</div>';
      return;
    }

    status.innerHTML = '<p class="search-count">' + scored.length + ' result' + (scored.length !== 1 ? 's' : '') + ' for <strong>' + escHtml(query) + '</strong></p>';

    results.innerHTML = scored.map(function(r) {
      const item   = r.item;
      const snip   = snippet(item.content || item.excerpt || '', terms);
      const tags   = (item.tags || []).map(function(t) {
        return '<span class="result-tag">' + escHtml(t) + '</span>';
      }).join('');

      return '<div class="search-result">' +
        '<div class="result-meta">' +
          '<span class="result-category">' + escHtml(item.category) + '</span>' +
          (item.date ? '<span class="result-date">' + escHtml(item.date) + '</span>' : '') +
        '</div>' +
        '<h3><a href="' + escHtml(item.url) + '">' + highlight(item.title, terms) + '</a></h3>' +
        (snip ? '<p class="result-excerpt">' + highlight(snip, terms) + '</p>' : '') +
        (tags ? '<div class="result-tags">' + tags + '</div>' : '') +
      '</div>';
    }).join('');
  }

  // ── init ─────────────────────────────────────────────────────────────────

  fetch('{{ "/search.json" | relative_url }}')
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load search index');
      return r.json();
    })
    .then(function(data) {
      allPosts = data;
      // Re-run search in case user already typed
      if (input.value.trim()) doSearch(input.value);
    })
    .catch(function(err) {
      status.innerHTML = '<p class="search-loading">Could not load search index.</p>';
      console.error(err);
    });

  // Debounced input
  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { doSearch(input.value); }, 150);
  });

  // Clear button
  clear.addEventListener('click', function() {
    input.value = '';
    input.focus();
    doSearch('');
  });

  // Handle ?q= in URL
  const urlQ = new URLSearchParams(window.location.search).get('q');
  if (urlQ) {
    input.value = urlQ;
    // Wait for data to load (handled in fetch .then above)
  }
})();
</script>

<style>
.search-page {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 24px;
}

.search-header {
  text-align: center;
  margin-bottom: 48px;
}

.search-header h1 {
  font-size: 48px;
  font-weight: 700;
  margin: 0 0 16px 0;
  color: var(--text);
}

.search-header p {
  font-size: 18px;
  color: var(--muted);
  margin: 0;
}

.search-container {
  background: var(--bg-2);
  border: 1px solid var(--primary);
  border-radius: 12px;
  padding: 32px;
}

.search-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 14px;
  width: 18px;
  height: 18px;
  color: var(--muted);
  pointer-events: none;
  flex-shrink: 0;
}

#search-trigger {
  width: 100%;
  padding: 14px 44px 14px 42px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search-trigger:focus {
  border-color: var(--snow-brown);
  box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
}

#search-trigger::placeholder {
  color: var(--muted);
}

.search-clear {
  position: absolute;
  right: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border: none;
  border-radius: 50%;
  background: var(--muted);
  color: var(--bg);
  font-size: 11px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  transition: background 0.15s;
}

.search-clear:hover {
  background: var(--snow-brown);
}

/* status line */
.search-count {
  margin: 20px 0 0 0;
  font-size: 14px;
  color: var(--muted);
}

.search-count strong {
  color: var(--text);
}

.search-loading {
  margin: 20px 0 0 0;
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
}

/* results */
#search-results {
  margin-top: 8px;
}

.search-result {
  padding: 20px 0;
  border-bottom: 1px solid var(--primary);
  transition: background-color 0.2s;
}

.search-result:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.search-result h3 {
  margin: 6px 0 8px 0;
  font-size: 18px;
  font-weight: 600;
}

.search-result h3 a {
  color: var(--text);
  text-decoration: none;
}

.search-result h3 a:hover {
  color: var(--snow-brown);
}

.result-excerpt {
  margin: 0 0 10px 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.6;
}

.result-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}

.result-category {
  background: var(--snow-brown);
  color: white;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.result-date {
  color: var(--muted);
}

.result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.result-tag {
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--primary);
  border-radius: 4px;
  padding: 2px 7px;
}

/* highlight */
mark {
  background: rgba(139, 115, 85, 0.25);
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

[data-theme="dark"] mark {
  background: rgba(139, 115, 85, 0.4);
}

.no-results {
  text-align: center;
  color: var(--muted);
  padding: 40px 0;
  font-size: 15px;
}

.no-results strong {
  color: var(--text);
}
</style>

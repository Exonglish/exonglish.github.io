---
layout: default
title: Contact
---

<div class="contact-container">
  <div class="contact-header">
    <h1 class="lvl0" id="contact">Let's Create Something Amazing!</h1>
    <p>Have a project in mind or just want to connect? I'd love to hear from you.</p>
  </div>

  <form id="contact-form" action="https://formspree.io/f/xrblwqqg" method="POST" class="contact-form">
    <div class="form-header">
      <h3 class="lvl1" id="contact-form-heading">Drop me a line</h3>
      <p>I'll get back to you as soon as possible!</p>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="form-input" required>
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-input" required>
      </div>
    </div>

    <div class="form-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" class="form-input form-textarea" required></textarea>
    </div>

    <div class="form-submit">
      <button type="submit" class="submit-btn">
        <span class="btn-text">Send Message</span>
      </button>
    </div>
  </form>
</div>

<!-- Success modal -->
<div id="success-overlay" class="success-overlay">
  <div class="success-card">
    <div class="success-icon"></div>
    <h2 class="success-title">Message Sent!</h2>
    <p class="success-text">Thank you for reaching out. I'll get back to you within 24 hours.</p>
    <button onclick="closeSuccessModal()" class="close-btn">Close</button>
  </div>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const form = this;
  const submitButton = form.querySelector('.submit-btn');
  const btnText = submitButton.querySelector('.btn-text');
  const original = btnText.textContent;

  btnText.textContent = 'Sending...';
  submitButton.disabled = true;

  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  })
  .then(response => {
    if (response.ok) {
      document.getElementById('success-overlay').classList.add('show');
      form.reset();
    } else {
      throw new Error('error');
    }
  })
  .catch(() => alert('Sorry, something went wrong. Please try again.'))
  .finally(() => {
    btnText.textContent = original;
    submitButton.disabled = false;
  });
});

function closeSuccessModal() {
  document.getElementById('success-overlay').classList.remove('show');
}

document.getElementById('success-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSuccessModal();
});
</script>

<style>
.contact-container {
  max-width: 680px;
  margin: 0 auto;
  padding: 60px 24px;
}

.contact-header {
  text-align: center;
  margin-bottom: 48px;
}

.contact-header h1 {
  font-size: 42px;
  font-weight: 400;
  margin: 0 0 16px 0;
  background: linear-gradient(135deg, var(--snow-brown), #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.contact-header p {
  font-size: 18px;
  color: var(--muted);
  margin: 0;
}

.contact-form {
  background: var(--bg-2);
  border-radius: 16px;
  padding: 40px;
  border: 1px solid var(--primary);
}

.form-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--primary);
}

.form-header h3 {
  font-size: 22px;
  font-weight: 400;
  margin: 0 0 6px 0;
  color: var(--text);
}

.form-header p {
  font-size: 14px;
  color: var(--muted);
  margin: 0;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
}

.form-field:last-child { margin-bottom: 0; }

.form-field label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-input {
  padding: 12px 14px;
  border: 1.5px solid var(--primary);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.form-input:focus {
  border-color: var(--snow-brown);
  box-shadow: 0 0 0 3px rgba(139,115,85,0.12);
}

.form-textarea {
  resize: vertical;
  min-height: 140px;
  line-height: 1.6;
}

.form-submit { margin-top: 8px; }

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--snow-brown);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.submit-btn:hover {
  background: #7a6347;
  transform: translateY(-1px);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

@media (max-width: 600px) {
  .contact-form { padding: 24px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
